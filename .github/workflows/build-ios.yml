name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Cho phép trigger thủ công

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: Install Flutter dependencies
      run: flutter pub get

    - name: Run Flutter analyze
      run: flutter analyze

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Create ios/Runner directory if not exists
      run: mkdir -p ios/Runner

    - name: Install CocoaPods
      run: |
        cd ios
        pod install || echo "No Podfile found, skipping pod install"
      continue-on-error: true

    # Code Signing - Cách 1: Sử dụng secrets (đơn giản hơn)
    - name: Import Code Signing Certificates
      if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
      run: |
        # Tạo keychain tạm thời
        security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        
        # Import certificate
        echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
        security import certificate.p12 -k build.keychain -P "${{ secrets.CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
        
        # Import provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

    # Code Signing - Cách 2: Sử dụng fastlane match (nâng cao)
    - name: Setup Fastlane Match (Optional)
      if: ${{ secrets.MATCH_GIT_URL != '' }}
      run: |
        cd ios
        bundle install
        bundle exec fastlane match appstore --readonly
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      continue-on-error: true

    # Build cho iOS (không cần code signing)
    - name: Build iOS (Debug - No Signing)
      if: ${{ secrets.IOS_CERTIFICATE_BASE64 == '' }}
      run: |
        flutter build ios --debug --no-codesign
        echo "⚠️ Built without code signing (debug mode only)"

    # Build cho iOS (với code signing)
    - name: Build iOS (Release - With Signing)
      if: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
      run: |
        flutter build ios --release --no-codesign
        cd ios
        xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -archivePath build/Runner.xcarchive \
          archive
        
        # Export IPA
        xcodebuild -exportArchive \
          -archivePath build/Runner.xcarchive \
          -exportPath build/Runner.ipa \
          -exportOptionsPlist ExportOptions.plist

    # Tạo IPA từ build debug (nếu không có code signing)
    - name: Create IPA from Debug Build
      if: ${{ secrets.IOS_CERTIFICATE_BASE64 == '' }}
      run: |
        mkdir -p build/ios/ipa
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r ../ipa/FirstApp-debug.ipa Payload
        echo "✅ Created debug IPA (unsigned)"
      continue-on-error: true

    # Upload IPA artifact
    - name: Upload IPA to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: |
          build/ios/ipa/*.ipa
          ios/build/Runner.ipa/*.ipa
        if-no-files-found: warn
        retention-days: 30

    # Upload debug build
    - name: Upload Debug Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-debug-build
        path: build/ios/iphoneos/Runner.app
      if: always()

    # Cleanup
    - name: Cleanup Keychain
      if: always()
      run: |
        security delete-keychain build.keychain || true

    - name: Build Summary
      if: always()
      run: |
        echo "## 📱 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "build/ios/ipa" ]; then
          echo "✅ IPA files created successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files:" >> $GITHUB_STEP_SUMMARY
          ls -lh build/ios/ipa/*.ipa 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- Check artifacts tab for IPA files" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No IPA files found. Check the build logs." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the IPA from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
