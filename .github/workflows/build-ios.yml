name: Build iOS IPA (Simple - Option A)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Cho phép trigger thủ công

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Create iOS project files
      run: |
        # Tạo iOS project nếu chưa có Runner.xcodeproj
        if [ ! -d "ios/Runner.xcodeproj" ]; then
          echo "📱 Creating iOS project files..."
          flutter create --platforms=ios .
          echo "✅ iOS project created"
        else
          echo "✅ iOS project already exists"
        fi

    - name: Install Flutter dependencies
      run: flutter pub get

    - name: Run Flutter analyze
      run: flutter analyze
      continue-on-error: true

    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
      continue-on-error: true

    # Build cho iOS (không cần code signing - Option A)
    - name: Build iOS (Debug - No Signing)
      run: |
        flutter build ios --debug --no-codesign
        echo "✅ Built without code signing (debug mode)"

    # Tạo IPA từ build debug
    - name: Create IPA from Debug Build
      run: |
        mkdir -p build/ios/ipa
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r ../ipa/FirstApp-debug.ipa Payload
        rm -rf Payload
        echo "✅ Created debug IPA (unsigned)"
        ls -lh ../ipa/
      continue-on-error: true

    # Upload IPA artifact
    - name: Upload IPA to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: build/ios/ipa/*.ipa
        if-no-files-found: warn
        retention-days: 30

    # Upload debug build
    - name: Upload Debug Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-debug-build
        path: build/ios/iphoneos/Runner.app
      if: always()

    - name: Build Summary
      if: always()
      run: |
        echo "## 📱 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Mode**: Debug (No Code Signing)" >> $GITHUB_STEP_SUMMARY
        echo "**Platform**: iOS" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "build/ios/ipa" ] && [ -f "build/ios/ipa/FirstApp-debug.ipa" ]; then
          echo "✅ IPA created successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Download" >> $GITHUB_STEP_SUMMARY
          echo "Check the **Artifacts** section below to download:" >> $GITHUB_STEP_SUMMARY
          echo "- **ios-ipa**: IPA file for installation" >> $GITHUB_STEP_SUMMARY
          echo "- **ios-debug-build**: Runner.app for debugging" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ IPA creation might have failed. Check the build logs." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **Note**: This IPA is unsigned and for testing only." >> $GITHUB_STEP_SUMMARY
